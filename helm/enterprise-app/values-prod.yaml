# Production overrides for enterprise-app
replicaCount: 2

image:
  repository: amalpk531/enterprise-app
  tag: "31"
  pullPolicy: Always

ingress:
  enabled: true
  className: nginx

  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    # Uncomment after cert-manager is installed
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"

  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix

  # Uncomment after cert-manager is installed
  # tls:
  #   - secretName: enterprise-app-tls
  #     hosts:
  #       - amalpk.qzz.io

config:
  NODE_ENV: production
  PORT: "5000"
  APP_NAME: "Enterprise Deployment Platform"

externalSecrets:
  enabled: true
  secretStoreName: aws-secretsmanager
  serviceAccountName: external-secrets-sa
  region: ap-south-1
  remoteKey: enterprise-app/prod
  iamRoleArn: "arn:aws:iam::659828096688:role/eksctl-enterprise-deployment-platform-prod-ad-Role1-jrD7goqsObT8"

resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 85

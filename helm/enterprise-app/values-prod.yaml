# Production overrides for enterprise-app
replicaCount: 2

image:
  repository: amalpk531/enterprise-app
  tag: "28"
  pullPolicy: Always

ingress:
  enabled: true
  className: nginx

  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    # Uncomment after cert-manager is installed
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"

  hosts:
    - host: amalpk.qzz.io
      paths:
        - path: /
          pathType: Prefix

  # Uncomment after cert-manager is installed
  # tls:
  #   - secretName: enterprise-app-tls
  #     hosts:
  #       - amalpk.qzz.io

config:
  NODE_ENV: production
  PORT: "5000"
  APP_NAME: "Enterprise Deployment Platform"

secrets:
  MONGO_URI: "mongodb://mongodb-prod:27017/enterprise_app"
  JWT_SECRET: "REPLACE_WITH_PROD_SECRET"

resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 85

apiVersion: v1
kind: Secret
metadata:
  name: enterprise-app-secret
  namespace: enterprise-app-prod
type: Opaque
stringData:
  # Base64 encoded values should be provided here. For demo, shown as plain stringData.
  # Generate with: echo -n 'value' | base64
  MONGO_URI: "mongodb://mongodb:27017/enterprise_app"
  JWT_SECRET: "change-me-in-production"
